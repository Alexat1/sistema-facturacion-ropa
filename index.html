<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Facturación - Tienda de Ropa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>👕 Boutique Fashion</h1>
    <h2>Sistema de Facturación</h2>

    <hr>

    <h3>Datos del Cliente</h3>

    <div class="grid">
        <div class="form-group">
            <label>Nombre del Cliente</label>
            <input type="text" id="client-name" placeholder="Ingrese el nombre">
        </div>

        <div class="form-group">
            <label>Cédula / RUC</label>
            <input type="text" id="client-id" placeholder="Ingrese la cédula">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" id="telefono" placeholder="0999999999">
        </div>

        <div class="form-group">
            <label>Correo</label>
            <input type="email" id="correo" placeholder="correo@gmail.com">
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="direccion" placeholder="Dirección">
        </div>

        <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="invoice-date">
        </div>

        <div class="form-group">
            <label>No. Factura</label>
            <input type="text" id="factura" value="FAC-0001" readonly>
        </div>
    </div>

    <hr class="no-print">

    <div class="no-print">
        <h3>Agregar Productos</h3>
        <div class="grid-productos">
            <div class="form-group">
                <label>Categoría</label>
                <select id="categoria">
                    <option value="">Seleccione</option>
                    <option>👕 Camisetas</option>
                    <option>👖 Pantalones</option>
                    <option>👗 Vestidos</option>
                    <option>🧥 Chaquetas</option>
                    <option>👚 Blusas</option>
                    <option>🩳 Shorts</option>
                    <option>👟 Zapatos</option>
                    <option>👜 Accesorios</option>
                </select>
            </div>

            <div class="form-group">
                <label>Producto</label>
                <select id="prod-desc" onchange="cargarPrecioProducto()">
                    <option value="">Seleccione un producto</option>
                    <option>Camiseta Básica</option>
                    <option>Camiseta Polo</option>
                    <option>Jean Slim</option>
                    <option>Jean Clásico</option>
                    <option>Vestido Casual</option>
                    <option>Vestido Elegante</option>
                    <option>Chaqueta Denim</option>
                    <option>Chaqueta Cuero</option>
                    <option>Blusa Manga Larga</option>
                    <option>Blusa Casual</option>
                    <option>Short Deportivo</option>
                    <option>Zapatos Deportivos</option>
                    <option>Zapatos Casuales</option>
                    <option>Bolso Casual</option>
                    <option>Cinturón</option>
                    <option>Gorra</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" id="prod-qty" min="1" value="1">
            </div>

            <div class="form-group">
                <label>Precio</label>
                <input type="number" id="prod-price" step="0.01">
            </div>

            <div class="form-group">
                <button type="button" onclick="addItem()">Agregar Producto</button>
            </div>
        </div>
    </div>

    <hr>

    <h3>Detalle de la Factura</h3>
    <table>
        <thead>
            <tr>
                <th>Categoría</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Subtotal</th>
                <th class="no-print">Acción</th>
            </tr>
        </thead>
        <tbody id="invoice-items"></tbody>
    </table>

    <div class="totals">
        <div>
            <span>Subtotal:</span>
            <span id="subtotal">$0.00</span>
        </div>
        <div>
            <span>IVA (15%):</span>
            <span id="iva">$0.00</span>
        </div>
        <div class="grand-total">
            <span>Total:</span>
            <span id="total">$0.00</span>
        </div>
    </div>

    <div class="actions no-print">
        <button class="btn-danger" onclick="clearInvoice()">Nueva Factura</button>
        <button onclick="window.print()">Imprimir Factura</button>
        <button onclick="guardarFactura()">Guardar Factura</button>
    </div>

</div>

<script src="script.js"></script>
</body>

</html>
